name: V4 Panel with tmate SSH

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  panel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        curl -sL https://deb.nodesource.com/setup_23.x | sudo bash -
        sudo apt install -y nodejs git zip unzip tmate

    - name: Clone V4 Panel
      run: |
        git clone https://github.com/teryxlabs/v4panel
        cd v4panel
        unzip panel.zip || true
        npm install
        npm run seed

    - name: Start Panel
      run: |
        cd v4panel
        nohup node . > panel.log 2>&1 &

    - name: Start tmate SSH
      uses: mxschmitt/action-tmate@v3
      with:
        wait-for-ssh: true

    - name: Keep Alive
      run: |
        echo "Keeping job alive for 6 hours..."
        sleep 21600  # max GitHub Actions runtime
