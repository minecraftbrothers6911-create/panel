name: v4panel Auto Backup + SSH + Playit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours

jobs:
  panel:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:  
      FILEBASE_ACCESS_KEY: ${{ secrets.FILEBASE_ACCESS_KEY }}  
      FILEBASE_SECRET_KEY: ${{ secrets.FILEBASE_SECRET_KEY }}  
      FILEBASE_BUCKET: ${{ secrets.FILEBASE_BUCKET }}  

    steps:  
      - name: Checkout Repo  
        uses: actions/checkout@v4  

      - name: Install Dependencies  
        run: |  
          sudo apt update
          sudo apt install -y nodejs npm tmate unzip curl zip git
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
          sudo npm install -g pm2

      - name: Set SSH password  
        run: |  
          echo "runner:MySecurePass123!" | sudo chpasswd  

      - name: Restore v4panel Backup from Filebase  
        run: |  
          mkdir -p v4panel
          cd v4panel
          aws --endpoint-url=https://s3.filebase.com s3 cp s3://$FILEBASE_BUCKET/panelbackup.zip panelbackup.zip || echo "No backup found"
          unzip -o panelbackup.zip || echo "No panel backup found"

      - name: Start v4panel with PM2  
        run: |  
          cd v4panel
          # Detect main file (index.js, server.js, or app.js)
          ENTRY_FILE=$(ls index.js 2>/dev/null || ls server.js 2>/dev/null || ls app.js 2>/dev/null)
          if [ -z "$ENTRY_FILE" ]; then
            echo "Error: No entry file found (index.js/server.js/app.js)"
            exit 1
          fi
          pm2 start "$ENTRY_FILE" --name "v4panel" || pm2 restart v4panel
          pm2 save

      - name: Start Playit + SSH + 30-min Backup Loop  
        run: |  
          chmod +x .github/scripts/panel_ssh_playit_loop.sh
          bash .github/scripts/panel_ssh_playit_loop.sh
